<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 | SKUAuditPro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <a class="brand" href="/">
          <span class="brand-mark">SA</span>
          <span>SKUAuditPro</span>
        </a>
        <p class="eyebrow">账户中心</p>
        <h1>登录后管理体检报告和付费套餐。</h1>
        <p class="auth-muted">已支持邮箱注册登录和 Google 登录。后续可按业务需要继续增加其他登录方式。</p>

        <div class="auth-tabs" role="tablist" aria-label="登录方式">
          <button class="auth-tab active" id="login-tab" type="button">登录</button>
          <button class="auth-tab" id="register-tab" type="button">注册</button>
        </div>

        <form class="auth-form" id="auth-form">
          <label id="name-row" hidden>
            你的称呼
            <input id="name" type="text" placeholder="例如：陈先生" />
          </label>
          <label>
            邮箱
            <input id="email" type="email" placeholder="you@example.com" required />
          </label>
          <label>
            密码
            <input id="password" type="password" minlength="6" placeholder="至少 6 位" required />
          </label>
          <button class="button primary full" id="auth-submit" type="submit">登录</button>
          <p class="form-note" id="auth-message"></p>
        </form>

        <button class="button secondary full" id="forgot-password" type="button">忘记密码 / Reset password</button>

        <div class="oauth-grid">
          <button class="button secondary full" data-provider="google" type="button">使用 Google 登录</button>
        </div>
        <p class="form-note">
          Google 登录会跳转到 Google 官方授权页面。
        </p>
        <p class="form-note legal-note">
          注册或登录即表示你同意 <a href="terms.html">服务条款</a> 和 <a href="privacy.html">隐私政策</a>。
        </p>
      </section>
    </main>
    <script src="auth.js"></script>
  </body>
</html>
