<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>重置密码 | SKUAuditPro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card">
        <a class="brand" href="/">
          <span class="brand-mark">SA</span>
          <span>SKUAuditPro</span>
        </a>
        <p class="eyebrow">Account security</p>
        <h1>重置你的登录密码</h1>
        <form class="auth-form" id="reset-form">
          <label>
            新密码
            <input id="new-password" type="password" minlength="6" placeholder="至少 6 位" required />
          </label>
          <button class="button primary full" type="submit">更新密码</button>
          <p class="form-note" id="reset-message"></p>
        </form>
      </section>
    </main>
    <script>
      const form = document.querySelector("#reset-form");
      const message = document.querySelector("#reset-message");
      const token = new URLSearchParams(window.location.search).get("token") || "";

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        message.textContent = "处理中...";
        const response = await fetch("/api/auth/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password: document.querySelector("#new-password").value }),
        });
        const data = await response.json();
        if (!response.ok) {
          message.textContent = data.error || "重置失败。";
          return;
        }
        message.innerHTML = '密码已更新。<a href="/login.html">返回登录</a>';
      });
    </script>
  </body>
</html>
